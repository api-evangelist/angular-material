aid: angular-material
url: https://raw.githubusercontent.com/api-evangelist/angular-material/refs/heads/main/apis.yml
apis:
  - aid: angular-material:angular-material-components-api
    name: Angular Material Components API
    tags:
      - Accessibility
      - Angular
      - Components
      - Material Design
      - Material Design 3
      - TypeScript
      - UI Components
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://material.angular.dev
    humanURL: https://material.angular.dev/components/categories
    properties:
      - url: https://material.angular.dev/components/categories
        type: Documentation
      - url: https://material.angular.dev/guide/getting-started
        type: GettingStarted
      - url: https://github.com/angular/components
        type: GitHub
      - url: https://www.npmjs.com/package/@angular/material
        type: PackageRegistry
      - url: https://material.angular.dev/guide/theming
        type: Guide
      - url: https://material.angular.dev/guide/accessibility
        type: Accessibility
      - url: https://github.com/angular/components/blob/main/CHANGELOG.md
        type: Changelog
    description: >-
      Angular Material is a comprehensive UI component library implementing
      Material Design for Angular applications. Since Angular 18, Angular Material
      fully supports Material Design 3 (M3) with design tokens implemented as CSS
      custom properties, a powerful theming system with color, typography, and
      shape customization, and over 30 accessible UI components including buttons,
      cards, dialogs, forms, navigation, data tables, and more.
  - aid: angular-material:angular-cdk-api
    name: Angular CDK API
    tags:
      - Accessibility
      - CDK
      - Component Development
      - Drag And Drop
      - Overlay
      - Utilities
      - Virtual Scroll
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://material.angular.dev/cdk
    humanURL: https://material.angular.dev/cdk/categories
    properties:
      - url: https://material.angular.dev/cdk/categories
        type: Documentation
      - url: https://github.com/angular/components
        type: GitHub
      - url: https://www.npmjs.com/package/@angular/cdk
        type: PackageRegistry
    description: >-
      The Angular Component Dev Kit (CDK) provides behavior primitives for
      building custom accessible UI components without Material Design styling.
      Includes overlay positioning, drag-and-drop, virtual scrolling, focus
      management, accessibility utilities, bidirectionality support, text field
      helpers, and clipboard utilities.
