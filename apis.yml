description: >-
  Angular Material is the official Material Design component library for Angular
  applications, maintained by the Angular team at Google. It provides over 30
  accessible UI components implementing Material Design 3 (M3) with design tokens,
  a theming system based on CSS custom properties, and the Angular Component Dev
  Kit (CDK) with behavior primitives for custom component development. Angular
  Material is published on npm as @angular/material and @angular/cdk.
